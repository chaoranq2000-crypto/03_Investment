# Scoring Schema — JSON Schema for scoring_rules.yaml
# Version: 1

$schema: "http://json-schema.org/draft-07/schema#"
title: ScoringRules
description: Schema for sector scoring rules

type: object
required:
  - score_model
  - dimensions
  - ratings

properties:
  score_model:
    type: string
    description: Model name (e.g. sector_build_position_score)

  version:
    type: string

  dimensions:
    type: object
    description: Seven scoring dimensions
    minProperties: 7
    maxProperties: 7
    patternProperties:
      "^[a-z_]+$":
        type: object
        required: [name, weight, description]
        properties:
          name:
            type: string
          weight:
            type: number
            minimum: 0
            maximum: 1
          description:
            type: string
          evidence_signals:
            type: object
            properties:
              positive: { type: array, items: { type: string } }
              negative: { type: array, items: { type: string } }

  ratings:
    type: object
    patternProperties:
      "^[A-E]$":
        type: object
        required: [name, min_total_score]
        properties:
          name:
            type: string
          min_total_score:
            type: number
            minimum: 0
            maximum: 10
          required:
            type: object
            description: Minimum score requirements per dimension
          description:
            type: string

  score_output_format:
    type: object
    properties:
      required_fields:
        type: array
        items: { type: string }
      forbidden:
        type: array
        items: { type: string }
      missing_data_handling:
        type: string

# Cross-field constraints:
# 1. Sum of all dimension weights must equal 1.0 (tolerance ±0.001)
# 2. Rating thresholds must be in descending order (A > B > C > D > E)
# 3. Every rating must have min_total_score
# 4. Required fields in score_output_format must include 'reason'
