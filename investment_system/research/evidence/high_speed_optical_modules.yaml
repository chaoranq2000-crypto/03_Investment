    source_id: HSOM-BUNDLE-300502-20260619
    project_id: tech_ai_semiconductor
    sector_id: cpo_optical_module_silicon_photonics
    subject_type: company
    subject_id: 300502.SZ
    subject_name: 新易盛
    claim: >
      业务暴露: 光互联产品占99.72%（含800G/1.6T）；境外收入238.72亿占96.16%；前5大客户占72.34%，第一大22.97%；800G全球市占25-30%。
      客户/订单: 全球少数具备800G以上规模化量产和交付能力的公司之一；全球首批1.6T量产交付；ROE 72.66%；1.6T良率95%+，毛利率50%+。
      产能进展: 800G硅光+薄膜铌酸锂双路线；1.6T已量产；泰国工厂二期高效运行；LPO/XPO/NPO/CPO全布局。
