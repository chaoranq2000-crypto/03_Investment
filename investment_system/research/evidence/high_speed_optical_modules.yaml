  # ── Per-Company Evidence Items ──────────────────────────────────────────────
  - evidence_id: EV-HSOM-COMPANY-300308-001
    source_ids:
      - HSOM-BUNDLE-300308-20260619
      - BAO-STOCK-300308-20260619
    source_id: HSOM-BUNDLE-300308-20260619
    project_id: tech_ai_semiconductor
    sector_id: cpo_optical_module_silicon_photonics
    subject_type: company
    subject_id: 300308.SZ
    subject_name: 中际旭创
    claim: >
      业务暴露: 光通信收发模块占97.95%（含800G/1.6T）；境外收入346.37亿占90.58%；前5大客户占75.98%（含英伟达/谷歌/Meta/MS/亚马逊）。
      客户/订单: 800G全球市占率>40%，1.6T市占率50-70%全球第一；前5大客户占75.98%，第一大客户24.06%；1.6T季度出货量环比提升；已锁定2026全年订单。
      产能进展: 1.6T季度环比出货提升；3.2T产能准备中；部分原材料供给偏紧张。
      产品阶段: 已量产800G/1.6T；3.2T产能准备中。
      预测变化: 2026E净利润289.70亿（29家均值）；2027E 506亿；开源预测2028E 750亿；高盛目标价1187元。
      催化剂: CSP资本开支2026预计+53%；800G规模化放量；1.6T量产出货；工信部《AI+通信》政策；深圳推动光模块向1.6T/3.2T升级；LightCounting预测1.6T 2027年需求7100万只。
      风险: 涨幅较大（近6月+148%，PE TTM 101x）；两头在外（汇率/关税风险）；客户集中度高；CPO/LPO路线竞争。
    evidence_type: historical_company_override_bundle
    metrics_supported:
      - revenue_2026E
      - revenue_2027E
      - net_profit_2026E
      - net_profit_2027E
      - pe_2026E
      - pe_2027E
      - peg_2026E
