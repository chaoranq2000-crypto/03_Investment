  - evidence_id: EV-OCFP-COMPANY-300570-001
    source_ids:
      - OCFP-BUNDLE-300570-20260330
      - CNINFO-AR-300570-20260330
    source_id: OCFP-BUNDLE-300570-20260330
    project_id: tech_ai_semiconductor
    sector_id: optical_chip_components
    subject_type: company
    subject_id: 300570.SZ
    subject_name: 太辰光
    claim: >
      业务暴露: 年报说明公司专注光通信领域，产品涵盖光通信器件及集成功能模块，广泛应用于电信网络、算力与云计算数据中心和政企专网。
      客户/订单: 年报可证实光器件产品用于算力与云计算数据中心，但未直接披露英伟达等终端客户绑定，客户穿透仍需二级证据。
      产能进展: 核心跟踪高密度连接器、MT插芯、PLC/AWG芯片和连接组件的需求放量；越南基地和MPO扩产需要公告或互动平台继续确认。
      产品阶段: 光无源和光有源器件产品已是主营业务，数据中心应用明确，MPO/MTP高密度互联弹性属于需要订单验证的增量逻辑。
      预测变化: 未取得 Wind/iFind/同花顺可索引一致预期；不将单一市场传闻写入正文。
      催化剂: 算力与云计算数据中心建设、高密度光纤连接器需求，光模块上游传导。
      风险: 近6月涨幅和PE均高，客户穿透证据不足，若订单兑现慢于股价预期则估值压力大。
