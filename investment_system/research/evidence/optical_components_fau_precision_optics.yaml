  冲突数据清单.md: '# 冲突数据清单


    本轮未发现跨来源数值冲突。需要注意：BaoStock财务字段和年报全文口径可能存在展示口径差异，最终正式入库时应以公司年报三表复核收入和利润。'
card_markdown: "# 光器件/FAU/精密光学\n\n## 1. 结论摘要\n\n光器件/FAU/精密光学可以作为AI算力硬件中的P1高弹性跟踪方向，但不应等同于高速光模块整机。它的投资逻辑是：800G向1.6T、3.2T升级，叠加CPO/OCS/硅光等路线推进，会把精度、可靠性、封装和连接密度要求传导到光纤阵列、MPO/MTP、高密度连接器、光学晶体、滤光片、透镜、铌酸锂调制器和精密光学加工环节。\n\
  \n本轮年报补证后，确定性排序大致为：光库科技和杰普特的FAU/MPO/光纤组件证据最直接，太辰光和天孚通信是成熟光通信上游器件平台，腾景科技在高速光模块无源元组件与OCS晶体上弹性较清晰，蓝特光学更多是精密光学潜在配套。估值与拥挤度方面，太辰光、腾景科技、光库科技、杰普特近3/6月涨幅较大，光库和腾景的静态估值尤其敏感；蓝特静态PE较低但主线收入暴露弱，不能简单因估值低而上调优先级。\n\
  \n初步动作：作为P1继续深挖，不作为无差别追高方向。优先跟踪“年报已验证产品进入数据中心/AI光通信链条、且后续能用订单或一致预期解释估值”的标的；对只具备精密光学平台属性但AI收入占比不透明的公司保持观察。\n\n## 2. 产业逻辑\n\n高速光互联升级的核心不是单一零件涨价，而是系统架构变化带来的精度和可靠性要求提升。1.6T以上光模块、CPO交换机、OCS光交换和硅光封装，会提高光纤阵列对位精度、连接器密度、偏振控制、透镜/晶体一致性、封装热稳定性和自动化测试要求。整机厂商在高速率、低功耗和低误码率约束下，会向上游器件供应商传导更严格的认证与良率要求。\n\
  \n这一方向的好处是单个环节可能“小而美”，收入体量小但利润弹性高；问题是不同公司的AI数据中心收入暴露差异很大。光库科技年报直接列出DR4/DR8 FAU、MT-FAU、CPO用光纤阵列、MPO/MTP连接器以及薄膜铌酸锂调制器，和本主题最贴近。杰普特年报把MPO、FAU和光纤组件放在数据中心、云计算、人工智能行业需求下讨论，说明其光连接业务已进入主题映射。腾景科技年报提到高速光模块无源元组件和OCS光交换机大尺寸纯钒酸钇晶体量产规模提升，属于OCS/光模块上游精密光学弹性。天孚通信、太辰光是成熟光器件平台，但需要继续拆客户和产品结构。蓝特光学有光通信应用的精密光学元件能力，但AI光通信收入占比仍不透明。\n\
  \n## 3. 上中下游位置\n\n上游包括光学玻璃、晶体材料、陶瓷插芯、光纤、镀膜材料、铌酸锂材料和精密加工设备。中游包括FAU、MPO/MTP、MT插芯、光纤阵列、隔离器、滤光片、偏振分束器、透镜、钒酸钇晶体、光纤组件、光测试仪器和激光/光学智能装备。下游是高速光模块、CPO/NPO、OCS交换、硅光封装、AI数据中心交换网络和长距/城域相干通信。\n\
  \n与其他主线的交叉主要有三类：第一，高速光模块整机对无源器件、FAU和连接器提出用量与良率需求；第二，CPO/OCS/硅光让光路靠近芯片侧，放大精密装调和晶体/透镜价值；第三，薄膜铌酸锂和高速调制器把材料平台升级与数据中心、AI、超算中心连接起来。\n\n## 4. 代表公司对比\n\
  \n| 公司 | 代码 | 主线证据强度 | 年报可证实的主线映射 | 估值和交易状态 |\n|---|---|---:|---|---|\n| 光库科技 | 300620 | 高 | FAU、MT-FAU、CPO用光纤阵列、MPO/MTP、薄膜铌酸锂均有年报证据 | 近6月+150.82%，PE\
  \ TTM 1675.86，赔率极敏感 |\n| 杰普特 | 688025 | 中高 | 光纤器件面向数据中心、云计算、AI，产品含MPO和FAU，光纤器件收入高增 | 近6月+211.42%，PE TTM 125.37，弹性强但需看光通信占比 |\n| 腾景科技 | 688195\
  \ | 中高 | 高速光模块无源元组件、OCS光交换机晶体量产提升，研发投入指向AI高速光互联 | 近1月回撤但PE TTM 381.75，估值仍高 |\n| 太辰光 | 300570 | 中高 | 光通信器件和集成功能模块应用于算力与云计算数据中心 | 近6月+141.59%，PE\
  \ TTM 213.78，拥挤明显 |\n| 天孚通信 | 300394 | 中高 | 光器件产品在光互连板块销售占比较高，下游包括数据中心市场 | 近6月+68.89%，PE TTM 120.49，龙头溢价较高 |\n| 蓝特光学 | 688127 | 中 | 准直透镜、微透镜等可用于光通信，AI带动算力与数据传输需求\
  \ | 近6月+156.61%，PE TTM 76.82，估值低于多数同组但暴露弱 |\n\n## 5. 业绩兑现情况\n\n天孚通信2025年收入51.63亿元、净利润20.18亿元，毛利率56.60%，净利率37.01%，是本组盈利质量最高的公司之一。年报把光器件产品与全球电信、光纤连接和数据中心市场绑定，同时提示AI算力需求推动业绩提升。问题在于客户集中和泰国工厂爬坡成本，若主要客户需求或采购政策变化，利润波动会被放大。\n\
  \n太辰光2025年收入15.47亿元、净利润3.08亿元，静态PE已超过200倍。年报可验证其专注光通信领域，产品覆盖光无源、光有源和集成功能模块，应用包括算力与云计算数据中心。它是P1方向里高密度连接器逻辑较强的标的，但年报层面没有直接穿透到终端CSP客户，估值需要订单和2026E利润继续解释。\n\
  \n腾景科技2025年收入5.86亿元、净利润0.75亿元，体量小但主题弹性强。年报称光通信领域受AI算力需求增长带动，高速光模块无源元组件和OCS光交换机大尺寸纯钒酸钇晶体量产规模提升，并且研发投入重点布局AI算力高速光互联。它的核心问题是估值已经明显高于当前利润体量，后续需要看OCS和高速光模块无源件是否持续放量。\n\
  \n光库科技2025年收入14.74亿元，表中利润字段仍需年报三表二次复核，但业务证据最直接。年报列出DR4/DR8 FAU、MT-FAU、CPO用光纤阵列、MPO/MTP连接器用于数据中心、云计算和移动通信；薄膜铌酸锂调制器用于超高速数据中心、人工智能和超算中心。年报还披露铌酸锂项目、泰国基地、头部客户小批量订单和部分批量出货进展。它是本方向最贴近FAU/CPO/薄膜铌酸锂的公司，但估值对兑现节奏极端敏感。\n\
  \n杰普特2025年收入20.74亿元、净利润2.78亿元。主业仍是激光器和激光/光学智能装备，但年报明确光纤器件围绕光连接/光通信，面向数据中心、云计算和人工智能需求，产品包括MPO、FAU和各类光纤组件。年报还披露光纤器件产品销售额同比增长560.42%，并布局FAU产线扩产和自动化。它不是纯光器件公司，但光连接业务正在从边缘业务变成重要增量。\n\
  \n蓝特光学2025年收入15.36亿元、净利润3.91亿元，PE TTM 76.82，在本组中静态估值相对低。年报可验证准直类透镜、微透镜等产品可应用于光通信，且AI应用带动算力、数据存储和传输需求。但它的AI光通信直接收入暴露、客户和订单证据不足，更适合作为精密光学平台型观察样本，而不是本方向首选。\n\
  \n## 6. 估值水平\n\n从静态估值看，蓝特光学PE TTM 76.82、天孚通信120.49、杰普特125.37相对还能讨论，太辰光213.78、腾景科技381.75、光库科技1675.86已经高度依赖2026E/2027E利润放量。PS角度，杰普特20.58、蓝特23.65较低，太辰光39.44、腾景46.91、天孚50.68、光库66.23偏高。由于可索引的一致预期和历史估值分位尚未接入，本轮不计算PEG和前瞻PE，也不把单一市场传闻当作一致预期。\n\
  \n估值结论是：这个方向不是便宜板块，而是高景气、高波动、高验证要求板块。若只看产业逻辑，光库、杰普特、腾景弹性更强；若看利润质量，天孚更稳；若看静态估值，蓝特最低但主题暴露弱。太辰光处在高涨幅、高PE和需要客户穿透证据的交叉位置，赔率明显依赖后续订单或业绩上修。\n\n## 7.\
  \ 行情与资金认可度\n\n资金已经明显认可本方向，但拥挤度同样突出。近6月涨幅方面，杰普特+211.42%、蓝特光学+156.61%、光库科技+150.82%、太辰光+141.59%、天孚通信+68.89%、腾景科技+27.75%。近3月涨幅方面，光库科技+138.58%、太辰光+125.41%、杰普特+111.69%位居前列，说明市场已经提前交易FAU/MPO/CPO和AI光通信上游弹性。\n\
  \n成交额也显示资金关注度很高：天孚通信20日平均成交额193.88亿元，光库科技61.40亿元，太辰光53.42亿元，腾景科技22.52亿元，杰普特16.66亿元，蓝特光学10.92亿元。天孚是流动性核心，光库、太辰、腾景、杰普特是弹性交易主阵地。后续如果出现放量滞涨、业绩预期未上修或公司公告无法继续验证订单，短期回撤风险会明显上升。\n\
  \n## 8. 未来催化\n\n产业催化包括1.6T光模块放量、3.2T预研、CPO/OCS交换机推进、硅光封装提升、AI数据中心资本开支和超算中心建设。公司催化方面，光库科技关注薄膜铌酸锂和泰国基地、FAU/MPO/CPO光纤阵列订单；杰普特关注MPO/MMC、FAU扩产和光纤器件收入占比；腾景科技关注高速光模块无源元组件和OCS晶体量产规模；天孚通信关注高速光引擎和CPO相关器件；太辰光关注高密度连接器需求；蓝特光学关注准直透镜、微透镜和精密光学元件是否进入光通信大客户链条。\n\
  \n政策催化本轮没有新增可索引政策文件写入正文。财报催化主要看2026年中报和三季报：高估值公司必须用收入、毛利率、订单和产能利用率兑现股价预期，单纯主题叙事不足以支撑当前部分标的估值。\n\n## 9. 风险与证伪信号\n\n第一是估值风险。光库科技、腾景科技、太辰光的静态估值明显高，若2026E利润不能快速上修，估值消化压力大。第二是客户穿透风险。年报能验证产品应用方向，但多数公司没有披露终端CSP客户比例，市场容易把间接供应链叙事交易成确定订单。第三是技术路线风险。CPO、OCS、薄膜铌酸锂、硅光等路线并非同一条产业链，不同方案会改变FAU、MPO、晶体、透镜和连接器价值分配。第四是产能爬坡和良率风险。泰国基地、铌酸锂项目、FAU自动化扩产都需要客户验证、量产良率和成本控制。第五是业务结构风险。杰普特和蓝特并非纯AI光通信公司，传统激光器、装备、消费电子、车载光学等业务周期会影响利润解释力。\n\
  \n证伪信号包括：高速光模块整机放量但上游公司毛利率没有提升；FAU/MPO/铌酸锂相关业务收入占比没有上升；客户验证停留在送样或小批量；产能项目结项但收入没有同步释放；股价继续放量上行而公司公告和财报没有新增证据。\n\n## 10. 初步评分\n\n| 维度 | 分数 | 证据\
  \ |\n|---:|---:|---|\n| 产业景气度 | 4 | 1.6T/CPO/OCS/AI数据中心对上游精密器件需求明确 |\n| 业绩兑现概率 | 4 | 光库、杰普特、腾景已有年报产品或收入增长证据，天孚和太辰有成熟光通信平台 |\n| 上涨空间 | 2 | 多数标的近3/6月涨幅已大，估值提前交易明显\
  \ |\n| 泡沫安全分 | 2 | 太辰、腾景、光库静态估值高，需2026E兑现支撑 |\n| 资金认可度 | 4 | 成交额和涨幅均显示资金关注度高 |\n| 催化强度 | 4 | 1.6T、CPO、OCS、薄膜铌酸锂、FAU/MPO扩产均有催化 |\n| 综合评分 | 66\
  \ | P1高弹性方向，适合深挖和等待证据，不适合无差别追高 |\n\n## 11. 投资优先级排序\n\n| 层级 | 公司 | 理由 |\n|---|---|---|\n| 深挖 | 光库科技 | 主题证据最直接，FAU/MPO/CPO光纤阵列和薄膜铌酸锂均有年报证据；但估值极高，只能等待业绩兑现解释\
  \ |\n| 深挖 | 杰普特 | 光纤器件收入高增，MPO/FAU和数据中心AI需求证据明确；需确认光通信业务占比能否持续提升 |\n| 跟踪 | 腾景科技 | 高速光模块无源元组件和OCS晶体证据清晰，收入体量小、估值高 |\n| 跟踪 | 天孚通信 | 成熟光器件龙头，利润质量强，但估值和客户集中风险需要前瞻利润支撑\
  \ |\n| 谨慎 | 太辰光 | 数据中心应用明确但涨幅和PE高，终端客户穿透证据不足 |\n| 观察 | 蓝特光学 | 精密光学能力明确但AI光通信直接收入暴露弱，需更多订单证据 |\n\n## 12. 数据缺口\n\n| 数据项 | 当前状态 | 下一步 |\n|---|---|---|\n\
