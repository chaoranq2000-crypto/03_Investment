      产能进展: 精密光学与先进光电产品矩阵扩展，OCS光交换机相关晶体产品量产规模提升，研发重点布局AI算力高速光互联。
      产品阶段: 高速光模块无源元组件和OCS相关晶体已经从概念转向量产规模提升，AI光通信收入弹性高于一般精密光学平台型公司。
