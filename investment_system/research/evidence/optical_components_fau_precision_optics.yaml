    高速光模块无源元组件和OCS相关晶体已经从概念转向量产规模提升，AI光通信收入弹性高于一般精密光学平台型公司。；预测变化: 未取得Wind/iFind/同花顺可索引一致预期；不将单一市场传闻写入正文。；催化剂: OCS光交换、硅光/CPO、AI算力高速光互联、北美光测试仪器业务。；风险:
