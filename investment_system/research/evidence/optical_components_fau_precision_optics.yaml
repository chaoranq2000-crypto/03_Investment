  source_id: SRC-OCFP-COMPANY-300394-20260407
  project_id: tech_ai_semiconductor
  sector_id: optical_chip_components
  subject_type: company
  subject_id: 300394.SZ
  subject_name: 天孚通信
  claim: '业务暴露: 年报明确公司光器件产品在光互连板块销售占比较高，下游包括电信、光纤连接和数据中心市场，AI算力需求是业绩提升的重要背景。；客户/订单: 年报提示主要客户收入占比较高，说明公司已嵌入头部客户链条，但具体客户名称和份额不在年报中展开。；产能进展: 泰国工厂处于投产爬坡阶段，年报提示初期熟练度和产能利用率会影响成本与毛利率。；产品阶段:
    光互连光器件是成熟收入来源，高速光引擎和CPO相关产品处于技术升级与放量跟踪阶段。；预测变化: 未取得Wind/iFind/同花顺可索引一致预期；不将单一市场传闻写入正文。；催化剂: AI算力资本开支、数据中心建设、CPO技术升级、高速光引擎募投项目收入提升。；风险: 客户集中、产品技术升级、泰国工厂爬坡成本、光器件价格竞争和毛利率下行。'
