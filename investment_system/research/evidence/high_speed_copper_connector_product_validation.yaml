    subject_id: 002130.SZ
    subject_name: 沃尔核材
    claim: >
      The 2025 annual report reports communications-cable business revenue of
      2,551 million yuan, up 49.83% year on year, and high-speed communications
      cable revenue of 1,017 million yuan, up 237.99% year on year. Segment
      reporting also discloses communications-cable segment revenue of
      2,582,822,622.53 yuan and segment cost of 1,986,039,709.16 yuan.
    evidence_type: company_segment_financial_disclosure
    evidence_strength: strong
    metrics_supported:
