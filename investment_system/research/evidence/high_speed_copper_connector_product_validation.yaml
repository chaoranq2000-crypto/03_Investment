evidence_items:
  - evidence_id: EV-HSCC-PRODUCT-002475-20260624
    source_id: CNINFO-AR-HSCC-002475-20260415
    source_ids:
      - CNINFO-AR-HSCC-002475-20260415
    project_id: tech_ai_semiconductor
    sector_id: high_speed_copper_connector
    subject_type: company
    subject_id: 002475.SZ
    subject_name: 立讯精密
    claim: >
      The 2025 annual report lists data-center copper high-speed interconnect
      solutions including Intrepid high-speed backplane, CPC/NPC, external
      interconnect products such as DAC/ACC/Lite Active Cable and related
      connectors, and internal interconnect products such as high-speed internal
      cable, SSIO and Riser Cable. It also reports that 224G KOOLIO CPC/NPC,
      224G Intrepid NEXUS backplane connector, and Intrepid Cable Cartridge
      high-speed cable backplane solutions have been commercialized in some
      mainstream domestic and overseas AI clusters.
    evidence_type: company_product_validation
    evidence_strength: strong
    metrics_supported:
      - product_stage
      - dac_acc_exposure
      - high_speed_connector_exposure
      - ai_data_center_interconnect
      - industrial_chain_position
      - customer_validation_partial
    time_scope: '2025FY'
    confidence: 高
    used_for:
      - sector_card
      - source_index
      - missing_data_log
      - risk_review
    not_allowed_for:
      - investment_conclusion
      - position_sizing
      - final_rating
    notes: >
      Strong evidence for product existence, product-stage progress, and partial
      customer/product validation. It is not a quantified order backlog,
      named-customer contract, or position-sizing basis.

  - evidence_id: EV-HSCC-FINSEG-002475-20260624
    source_id: CNINFO-AR-HSCC-002475-20260415
    source_ids:
      - CNINFO-AR-HSCC-002475-20260415
    project_id: tech_ai_semiconductor
    sector_id: high_speed_copper_connector
    subject_type: company
    subject_id: 002475.SZ
    subject_name: 立讯精密
    claim: >
      The 2025 annual report discloses the communications and data-center
      business segment revenue as 24,567,610,128.22 yuan, 7.39% of total
      revenue, up 33.81% year on year, with segment gross margin of 18.40%.
      The segment includes AI server parts, high-speed electrical interconnect,
      optical interconnect, thermal management, power management, server systems
      and communication infrastructure products; the report does not isolate
      DAC/AEC revenue.
    evidence_type: company_segment_financial_disclosure
    evidence_strength: strong
    metrics_supported:
      - segment_revenue
      - segment_gross_margin
      - industrial_chain_position
      - revenue_context
    time_scope: '2025FY'
    confidence: 高
    used_for:
      - sector_card
      - source_index
      - missing_data_log
      - risk_review
    not_allowed_for:
      - investment_conclusion
      - position_sizing
      - final_rating
    notes: >
      Segment disclosure supports scale/context for communications and
      data-center activity, but not product-level copper-cable revenue.

  - evidence_id: EV-HSCC-PRODUCT-002130-20260624
    source_id: CNINFO-AR-HSCC-002130-20260401
    source_ids:
      - CNINFO-AR-HSCC-002130-20260401
    project_id: tech_ai_semiconductor
    sector_id: high_speed_copper_connector
    subject_type: company
    subject_id: 002130.SZ
    subject_name: 沃尔核材
    claim: >
      The 2025 annual report states that the communications-cable business
      includes high-speed communication cables, automotive cables and industrial
      cables, with low signal attenuation, strong anti-interference ability and
      high-speed data transmission. It reports stable delivery of multiple
      224G high-speed communication cable products, sample development of 448G
      high-speed communication cable products submitted to key customers for
      validation, PCIe 7.0 high-speed cable development with validation
      completed and small-batch trial production, and capacity expansion at
      Huizhou and Vietnam production bases.
    evidence_type: company_product_validation
    evidence_strength: strong
    metrics_supported:
      - product_stage
      - high_speed_copper_cable_exposure
      - customer_validation_partial
      - capacity_progress
      - industrial_chain_position
    time_scope: '2025FY'
    confidence: 高
    used_for:
      - sector_card
      - source_index
      - missing_data_log
      - risk_review
    not_allowed_for:
      - investment_conclusion
      - position_sizing
      - final_rating
    notes: >
      Strong evidence for high-speed communications-cable exposure, 224G/448G
      product stage and capacity progress. The annual report does not provide
      a named DAC/AEC product line, named end customer, or signed order amount.

