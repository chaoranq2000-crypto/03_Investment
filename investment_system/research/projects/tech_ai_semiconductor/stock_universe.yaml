# Stock Universe — tech_ai_semiconductor
# universe_status: seed_pool — represents initial seed companies, not a complete universe
# verification_status values:
#   unverified              — no evidence verification done
#   partially_verified      — some fields verified (e.g. financials only)
#   verified                — all key fields verified with source_id
# exposure_type values:
#   核心收入   — >80% revenue from this sector
#   高纯度     — 50-80% from this sector
#   中度暴露   — 20-50% from this sector
#   低纯度     — <20% from this sector
# role values:
#   龙头    — market leader
#   核心    — core player
#   弹性    — high-elasticity player
#   边缘    — peripheral player
# source values:
#   migrated_from_existing_outputs  — came from existing CSVs/markdown
#   migrated_from_mother_table       — came from A股科技前两主线母表
#   expanded_from_taxonomy_seed      — came from 主线目录.md taxonomy expansion
#   pending_verification             — expanded but not yet verified
# IMPORTANT: All stock codes must use full exchange suffix: 300308.SZ, 688256.SH, 601138.SH
# Stock code pattern: ^\d{6}\.(SH|SZ|BJ)$

universe_status: seed_pool
coverage_status: incomplete
source_basis:
  - migrated_from_existing_outputs
  - migrated_from_mother_table
  - expanded_from_taxonomy_seed
verification_default: unverified
notes: >
  This is a SEED POOL, not a complete universe. Companies were migrated from
