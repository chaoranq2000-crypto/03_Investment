# Sector Universe — tech_ai_semiconductor
# Two-layer structure: research_groups (primary research batches) → sectors (final scoring units)
# Priority key: P0=立即执行, P1=尽快执行, P2=计划中, P3=外围观察
# Status key:
#   indexed_existing_partial  — existing output indexed, needs verification
#   seeded_unverified         — seeded from MD, not yet verified
#   planned                  — not yet started
#   observation_only         — peripheral observation only, no active research
# scoring_enabled: true = eligible for scoring, false = observation only
# Important: Do NOT mark seed documents as completed; all completed outputs
# must pass evidence + source verification before upgrading to research-grade.

universe_version: "1"
created_date: "2026-06-20"
source_documents:
  - path: C:/Projects/03_Investment/主线目录.md
    type: taxonomy_seed_document
    role: primary taxonomy foundation
  - path: 科技主线调研输出/01_AI算力硬件/01_高速光模块.md
    type: sector_card_seed
    role: existing output migrated
  - path: 科技主线调研输出/01_AI算力硬件/01_光器件_FAU_精密光学.md
    type: sector_card_seed
    role: existing output migrated

# ── Research Groups (Tier 1: primary research batches) ──────────────────────
research_groups:

  - group_id: ai_chips_compute
    group_name: AI芯片/算力
    group_order: 01
    priority: P0
    description: >
      国产AI芯片/GPU/DCU/ASIC，A股核心标的性能与生态验证。
      重点关注：是否量产、是否进入真实集群、客户是谁。
    sector_ids:
      - ai_chips_gpu_dcu_asic

  - group_id: ai_server_infrastructure
    group_name: AI服务器/基础设施
    group_order: 02
    priority: P1
    description: >
      AI服务器整机柜、超节点、交换机、AIDC/算力租赁、液冷温控、
      数据中心电源/HVDC/UPS，属于AI资本开支最直接承接层。
    sector_ids:
      - ai_server_rack_supernode_switch
      - aidc_data_center_compute_leasing
      - liquid_cooling_thermal
      - data_center_power_hvdc_ups

  - group_id: optical_interconnect
    group_name: 光通信/高速互连
    group_order: 03
    priority: P0
    description: >
      A股AI硬件中最核心、最全球化的方向。
      CPO被描述为下一代高密度低功耗光互联方案，受AI集群扩张和
      交换芯片带宽升级推动。
    sector_ids:
      - cpo_optical_module_silicon_photonics
      - optical_chip_components
      - fiber_cable_hollow_core_dci
      - high_speed_copper_connector

  - group_id: pcb_ccl_substrate
    group_name: PCB/CCL/载板
    group_order: 04
    priority: P1
    description: >
      AI服务器、交换机、光模块、GPU板卡共同的底座。
      资金逐步从AI硬件核心大票向上游材料延伸。
    sector_ids:
      - ai_server_pcb_high_speed_board
      - ccl_high_frequency_materials
      - ic_substrate_abf_glass_tgv

  - group_id: semiconductor_equipment_materials
    group_name: 半导体设备/材料
    group_order: 05
    priority: P1
    description: >
      国产替代最硬的方向，受AI先进制程、先进存储、本土晶圆厂
      扩产等多重驱动，且具备国产化和需求扩张逻辑。
    sector_ids:
      - semiconductor_frontend_equipment
      - semiconductor_metrology_test_equipment
      - semiconductor_components_parts
      - semiconductor_materials

  - group_id: memory_packaging
    group_name: 存储/先进封装
    group_order: 06
    priority: P1
    description: >
      AI服务器带动HBM、DDR5、企业级SSD需求。
      先进封装是国产高端芯片突破口。
    sector_ids:
      - memory_hbm_ddr5
      - advanced_packaging_chiplet_cowos_tsv

  - group_id: semiconductor_design_manufacturing
    group_name: 半导体设计/制造/EDA
    group_order: 07
    priority: P2
    description: >
      晶圆制造、特色工艺、EDA软件、芯片IP、设计服务、SoC/MCU。
      端侧AI芯片是AI从云端走向终端的关键载体。
    sector_ids:
      - wafer_foundry_specialty_process
      - eda_ip_design_service
      - edge_ai_soc_mcu

  - group_id: ai_application_data
    group_name: AI应用/数据要素
    group_order: 08
    priority: P2
    description: >
      大模型/AIGC/Agent/办公软件、行业AI应用、数据要素/语料/
      版权/数据安全。不属于半导体硬件，属于AI主线的应用端。
    sector_ids:
      - llm_aigc_agent_office
      - industry_ai_applications
      - data_elements_corpus_copyright_security

  - group_id: ai_terminal_consumer_electronics
    group_name: 端侧AI/消费电子
    group_order: 09
    priority: P2
    description: >
      AI PC、AI手机、AI眼镜、AI耳机等新一代AI硬件入口。
      与SoC、存储、光学、声学、ODM高度相关。
    sector_ids:
      - ai_pc_phone_glasses_earbuds

  - group_id: peripheral_observation
    group_name: 外围科技观察
    group_order: 10
    priority: P3
    description: >
      6G/算力网络、卫星互联网、量子科技、信创/国产软件。
      只作为观察池，不进入第一阶段核心评分。
    sector_ids:
      - sixg_compute_network
      - satellite_internet
      - quantum_technology
      - xinchuang_domestic_software

